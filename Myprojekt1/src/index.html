<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Привоз Онлайн</title>


    <!-- Подключение CSS -->

    <link rel="stylesheet" href="css/base.css?v=20260622-1">
    <link rel="stylesheet" href="css/home.css?v=20260623-3">
    <link rel="stylesheet" href="css/components.css?v=20260622-1">
    <link rel="stylesheet" href="css/seller.css?v=20260622-1">
    <link rel="stylesheet" href="css/glass-theme.css?v=20260622-1">
    <link rel="stylesheet" href="css/internal-pages.css?v=20260628-1">
    <link rel="stylesheet" href="css/overrides.css?v=20260630-5">

</head>

<body class="home-page">

    <div class="container">


        <!-- Главный заголовок -->

        <header class="header home-header">
            <p class="home-kicker">Одесса · рынок Привоз</p>

            <h1 class="brand-title hero-brand">

                Привоз Онлайн

            </h1>


            <p class="subtitle">

                Выбирайте дома. Покупайте у своих.

            </p>

        </header>


        <!-- Поиск товаров -->

        <section class="search-section home-search">

            <span class="home-search-icon">⌕</span>

            <input
                type="text"
                id="searchInput"
                placeholder="Найти продукты..."
            >

            <button
                id="searchBtn"
                class="home-search-btn"
            >

                Поиск

            </button>

        </section>


        <!-- Будущие предложения товаров -->

        <section class="home-category-section home-offers-section">

            <div class="home-section-row">
                <button
                    id="offersFilterBtn"
                    class="home-offers-title-btn"
                    type="button"
                    aria-expanded="false"
                >
                    Предложения
                </button>
                <span class="home-section-note">Новинки и свежие цены</span>
            </div>

            <div
                id="offersFilterPanel"
                class="offers-filter-panel"
                aria-hidden="true"
            ></div>

            <div id="homeOffersGrid" class="home-offers-grid"></div>

        </section>


        <!-- Короткие преимущества -->

        <section class="home-benefits">
            <button
                id="categoriesToggleBtn"
                type="button"
                aria-expanded="false"
            >
                <span class="home-benefit-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <rect x="4" y="4" width="6" height="6" rx="1.5"></rect>
                        <rect x="14" y="4" width="6" height="6" rx="1.5"></rect>
                        <rect x="4" y="14" width="6" height="6" rx="1.5"></rect>
                        <rect x="14" y="14" width="6" height="6" rx="1.5"></rect>
                    </svg>
                </span>
                <p>Категории</p>
            </button>

            <button
                id="sellerCabinetsBtn"
                type="button"
            >
                <span class="home-benefit-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M5 9.5h14l-1.1-4.2H6.1L5 9.5Z"></path>
                        <path d="M6.4 9.5v9.2h11.2V9.5"></path>
                        <path d="M9 18.7v-5.2h6v5.2"></path>
                    </svg>
                </span>
                <p>Лавка</p>
                <small>+ Новая лавка</small>
            </button>

            <button
                id="favoritesBtn"
                type="button"
            >
                <span class="home-benefit-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="m12 4.3 2.2 4.5 5 .7-3.6 3.5.9 5-4.5-2.4L7.5 18l.9-5-3.6-3.5 5-.7L12 4.3Z"></path>
                    </svg>
                </span>
                <p>Избранное</p>
            </button>
        </section>


        <!-- Полный список категорий раскрывается на этой же странице -->

        <section
            id="homeAllCategoriesPanel"
            class="home-all-categories"
            aria-hidden="true"
        >
            <div
                id="homeAllCategoriesGrid"
                class="home-all-categories-grid"
            ></div>
        </section>


    </div>

    <!-- Выбор действия для продавца -->
    <div id="sellerChoiceModal" class="modal seller-choice-modal">
        <div class="modal-content seller-choice-content">
            <h2>Моя лавка</h2>

            <button id="sellerCabinetChoice" class="btn-primary" type="button">
                Открыть лавку
            </button>

            <button id="sellerEditChoice" class="btn-outline" type="button">
                Редактировать лавку
            </button>

            <button id="sellerNewChoice" class="btn-outline" type="button">
                + Новая лавка
            </button>
        </div>
    </div>

    <!-- Быстрый просмотр товара прямо с главной страницы -->
    <div id="productModal" class="modal">
        <div class="modal-content product-modal-content">
            <div id="productModalImage" class="product-modal-image"></div>
            <h3 id="productModalTitle"></h3>
            <p id="productModalPrice" class="product-modal-price"></p>
        </div>
    </div>


    <!-- Подключение JS -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js?v=20260701-3"></script>
    <script src="js/i18n.js?v=20260630-1"></script>
    <script src="js/core.js?v=20260701-1"></script>
    <script src="js/home.js?v=20260701-2"></script>
    <script src="js/seller-panel.js?v=20260629-2"></script>
    <script src="js/catalog.js?v=20260701-2"></script>
    <script src="js/app.js?v=20260701-2"></script>

</body>

</html>
