<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Привоз Онлайн</title>


    <!-- Подключение CSS -->

    <link rel="stylesheet" href="css/base.css?v=20260622-1">
    <link rel="stylesheet" href="css/home.css?v=20260622-1">
    <link rel="stylesheet" href="css/components.css?v=20260622-1">
    <link rel="stylesheet" href="css/seller.css?v=20260622-1">
    <link rel="stylesheet" href="css/glass-theme.css?v=20260622-1">
    <link rel="stylesheet" href="css/internal-pages.css?v=20260622-1">
    <link rel="stylesheet" href="css/overrides.css?v=20260622-1">

</head>

<body class="home-page">

    <div class="container">


        <!-- Главный заголовок -->

        <header class="header home-header">
            <p class="home-kicker">Одесса · рынок Привоз</p>

            <h1 class="brand-title hero-brand">

                Привоз Онлайн

            </h1>


            <p class="subtitle">

                Выбирайте дома. Покупайте у своих.

            </p>

        </header>


        <!-- Поиск товаров -->

        <section class="search-section home-search">

            <span class="home-search-icon">⌕</span>

            <input
                type="text"
                id="searchInput"
                placeholder="Найти продукты..."
            >

            <button
                id="searchBtn"
                class="home-search-btn"
            >

                Поиск

            </button>

        </section>


        <!-- Будущие предложения товаров -->

        <section class="home-category-section home-offers-section">

            <div class="home-section-row">
                <h2>Предложения</h2>
                <span class="home-section-note">Идею доработаем</span>
            </div>

            <!-- TODO: придумать логику меняющихся предложений конкретных товаров -->
            <div class="home-offers-placeholder">
                <span class="home-offers-mark">✦</span>

                <div>
                    <strong>Здесь будут меняться товары</strong>
                    <p>Позже решим, какие предложения показывать покупателю.</p>
                </div>
            </div>

        </section>


        <!-- Короткие преимущества -->

        <section class="home-benefits">
            <button
                id="categoriesToggleBtn"
                type="button"
                aria-expanded="false"
            >
                <span>▦</span>
                <p>Категории</p>
            </button>

            <button
                id="sellerCabinetsBtn"
                type="button"
            >
                <span>▤</span>
                <p>Лавка</p>
                <small>+ Новая лавка</small>
            </button>

            <button
                id="favoritesBtn"
                type="button"
            >
                <span>☆</span>
                <p>Избранное</p>
            </button>
        </section>


        <!-- Полный список категорий раскрывается на этой же странице -->

        <section
            id="homeAllCategoriesPanel"
            class="home-all-categories"
            aria-hidden="true"
        >
            <div
                id="homeAllCategoriesGrid"
                class="home-all-categories-grid"
            ></div>
        </section>


    </div>

    <!-- Выбор действия для продавца -->
    <div id="sellerChoiceModal" class="modal seller-choice-modal">
        <div class="modal-content seller-choice-content">
            <h2>Моя лавка</h2>

            <button id="sellerCabinetChoice" class="btn-primary" type="button">
                Открыть лавку
            </button>

            <button id="sellerEditChoice" class="btn-outline" type="button">
                Редактировать лавку
            </button>

            <button id="sellerNewChoice" class="btn-outline" type="button">
                + Новая лавка
            </button>
        </div>
    </div>


    <!-- Подключение JS -->

    <script src="js/core.js?v=20260622-1"></script>
    <script src="js/home.js?v=20260622-1"></script>
    <script src="js/seller-panel.js?v=20260622-1"></script>
    <script src="js/catalog.js?v=20260622-1"></script>
    <script src="js/app.js?v=20260622-1"></script>

</body>

</html>
