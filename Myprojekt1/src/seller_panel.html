<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Панель продавца — Привоз Онлайн</title>

    <link rel="stylesheet" href="css/style.css?v=20260621-7">
</head>

<body class="glass-page seller-panel-page">
    <div class="container">
        <nav class="top-bar page-navigation" aria-label="Навигация по сайту">
            <button class="back-home-btn" type="button">
                Назад
            </button>

            <a class="brand-title site-brand" href="index.html">
                Привоз
            </a>

            <button class="favorites-nav-btn" type="button">
                ☆ Избранное
            </button>
        </nav>

        <header class="header">
            <h1 class="logo">
                Управление лавкой
            </h1>

            <p class="subtitle">
                Заполните профиль продавца и добавляйте товары
            </p>
        </header>

        <div class="cabinet-menu" aria-label="Меню кабинета">
            <button id="toggleProfileBtn" class="btn-outline" type="button" aria-expanded="false">
                Редактировать лавку
            </button>

            <button id="allCabinetsBtn" class="btn-outline" type="button">
                Мои лавки
            </button>
        </div>

        <section id="sellerProfilePanel" class="panel-section profile-block is-collapsed">
            <h2>
                Профиль лавки
            </h2>

            <input
                type="text"
                id="profileSellerName"
                placeholder="Название лавки"
            >

            <textarea
                id="profileSellerDescription"
                placeholder="Описание лавки"
            ></textarea>

            <textarea
                id="profileFindInfo"
                placeholder="Описание для кнопки Как найти"
            ></textarea>

            <div class="contact-fields">
                <input
                    type="tel"
                    id="profilePhone"
                    placeholder="Номер телефона"
                >

                <input
                    type="text"
                    id="profileTelegram"
                    placeholder="Ссылка или имя Telegram"
                >

                <input
                    type="text"
                    id="profileInstagram"
                    placeholder="Ссылка или имя Instagram"
                >

                <input
                    type="text"
                    id="profileViber"
                    placeholder="Ссылка или номер Viber"
                >
            </div>

            <!-- Фон верхней карточки на странице продавца -->
            <div class="cover-upload">
                <label
                    for="sellerCoverImage"
                    class="photo-upload-btn"
                >
                    Добавить фон лавки
                </label>

                <input
                    type="file"
                    id="sellerCoverImage"
                    accept="image/*"
                >

                <div
                    id="sellerCoverPreview"
                    class="seller-cover-preview hidden"
                ></div>

                <button
                    id="removeSellerCoverBtn"
                    class="btn-outline hidden"
                    type="button"
                >
                    Убрать фон лавки
                </button>

                <p class="field-note">
                    Фон появится за названием, временем работы и кнопками лавки.
                </p>
            </div>

            <select id="profileSellerCategory"></select>

            <div class="time-block">
                <input
                    type="time"
                    id="profileOpenTime"
                >

                <input
                    type="time"
                    id="profileCloseTime"
                >
            </div>

            <button
                id="saveSellerProfileBtn"
                class="add-btn"
            >
                Сохранить профиль
            </button>

            <p
                id="profileMessage"
                class="form-message"
            ></p>
        </section>

        <div class="product-workbench">
        <section class="panel-section form-block product-editor">
            <h2 id="productFormTitle">
                Добавить товар
            </h2>

            <input
                type="text"
                id="productName"
                placeholder="Название товара"
            >

            <input
                type="text"
                id="productDepartment"
                placeholder="Отдел, например Сыры"
                list="departmentSuggestions"
                autocomplete="off"
            >

            <datalist id="departmentSuggestions"></datalist>

            <select id="category"></select>

            <input
                type="number"
                id="price"
                placeholder="Цена"
                min="0"
            >

            <select id="unit">
                <option value="kg">
                    кг
                </option>

                <option value="gram">
                    г
                </option>

                <option value="liter">
                    л
                </option>

                <option value="piece">
                    шт
                </option>

                <option value="pack">
                    упаковка
                </option>
            </select>

            <textarea
                id="productDescription"
                placeholder="Описание товара"
            ></textarea>

            <div class="photo-upload">
                <label
                    for="productImage"
                    class="photo-upload-btn"
                    id="productImageLabel"
                >
                    Добавить до 2 фото
                </label>

                <input
                    type="file"
                    id="productImage"
                    accept="image/*"
                    multiple
                >

                <div
                    id="productImagePreview"
                    class="photo-preview hidden"
                ></div>

                <p
                    id="productImageStatus"
                    class="photo-status hidden"
                ></p>

                <button
                    id="removeProductImageBtn"
                    class="btn-outline hidden"
                    type="button"
                >
                    Убрать фото
                </button>
            </div>

            <button
                id="addProductBtn"
                class="add-btn"
            >
                Добавить товар
            </button>

            <button
                id="cancelEditProductBtn"
                class="btn-outline hidden"
                type="button"
            >
                Отменить редактирование
            </button>

            <p
                id="productMessage"
                class="form-message"
            ></p>
        </section>

        </div>

        <section class="panel-section products-section">
            <h2>
                Товары лавки
            </h2>

            <div
                class="product-list"
                id="productList"
            ></div>
        </section>
    </div>

    <script src="js/script.js?v=20260621-7"></script>
</body>

</html>
