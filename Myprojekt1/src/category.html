<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Категория — Привоз Онлайн</title>

    <link rel="stylesheet" href="css/style.css?v=20260621-5">
</head>

<body class="glass-page category-page">
    <div class="container">
        <nav class="top-bar page-navigation" aria-label="Навигация по сайту">
            <button class="back-home-btn" type="button">
                Назад
            </button>

            <a class="brand-title site-brand" href="index.html">
                Привоз
            </a>
        </nav>

        <section class="category-section category-results-panel">
            <p
                id="categoryPageLabel"
                class="category-page-label hidden"
            ></p>

            <div
                class="sellers-list"
                id="categorySellers"
            ></div>
        </section>

    </div>

    <!-- Просмотр фотографии найденного товара -->
    <div
        id="productModal"
        class="modal"
    >
        <div class="modal-content product-modal-content">
            <div
                id="productModalImage"
                class="product-modal-image"
            ></div>

            <h3 id="productModalTitle"></h3>

            <p
                id="productModalPrice"
                class="product-modal-price"
            ></p>
        </div>
    </div>

    <script src="js/script.js?v=20260621-5"></script>
</body>

</html>
