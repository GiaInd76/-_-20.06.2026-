<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Продавец — Привоз Онлайн

    </title>


    <!-- Подключение CSS -->

    <link rel="stylesheet" href="css/base.css?v=20260622-1">
    <link rel="stylesheet" href="css/home.css?v=20260623-3">
    <link rel="stylesheet" href="css/components.css?v=20260622-1">
    <link rel="stylesheet" href="css/seller.css?v=20260622-1">
    <link rel="stylesheet" href="css/glass-theme.css?v=20260622-1">
    <link rel="stylesheet" href="css/internal-pages.css?v=20260622-1">
    <link rel="stylesheet" href="css/overrides.css?v=20260625-1">

</head>

<body class="glass-page seller-page">

    <div class="container">


        <!-- Общая навигация внутренних страниц -->

        <nav class="top-bar page-navigation" aria-label="Навигация по сайту">
            <button class="back-home-btn" type="button">
                Назад
            </button>

            <a class="brand-title site-brand" href="index.html">
                Привоз
            </a>

            <button class="favorites-nav-btn" type="button">
                ☆ Избранное
            </button>
        </nav>


        <!-- Данные продавца -->

        <div id="sellerPage"></div>


        <!-- Список товаров -->

        <section class="seller-menu">

            <h2 class="section-title">

                Товары

            </h2>

            <div
                id="sellerDepartments"
                class="seller-departments hidden"
                aria-label="Отделы лавки"
            ></div>


            <!-- JS вставит товары -->

            <div
                class="product-list"
                id="sellerProducts"
            ></div>

        </section>


    </div>


    <!-- Редактирование товара владельцем лавки -->

    <div id="ownerProductModal" class="modal">
        <div class="modal-content owner-product-editor">
            <h2>Редактировать товар</h2>

            <input id="ownerProductName" type="text" placeholder="Название товара">
            <input id="ownerProductDepartment" type="text" placeholder="Отдел">
            <input
                id="ownerProductPrice"
                type="text"
                inputmode="decimal"
                maxlength="24"
                placeholder="Цена, например 630 или 630/650"
            >

            <select id="ownerProductUnit">
                <option value="kg">кг</option>
                <option value="gram">г</option>
                <option value="liter">л</option>
                <option value="piece">шт</option>
                <option value="pack">упаковка</option>
            </select>

            <textarea id="ownerProductDescription" placeholder="Описание товара"></textarea>

            <button id="saveOwnerProductBtn" class="add-btn" type="button">
                Сохранить
            </button>

            <button id="cancelOwnerProductBtn" class="btn-outline" type="button">
                Отмена
            </button>

            <p id="ownerProductMessage" class="form-message"></p>
        </div>
    </div>


    <!-- Модальное окно товара -->

    <div
        id="productModal"
        class="modal"
    >

        <div class="modal-content product-modal-content">

            <div
                id="productModalImage"
                class="product-modal-image"
            ></div>

            <h3 id="productModalTitle"></h3>

            <p
                id="productModalPrice"
                class="product-modal-price"
            ></p>

        </div>

    </div>


    <!-- Модальное окно -->

    <div
        id="modal"
        class="modal info-modal"
    >

        <div class="modal-content info-modal-content">

            <p id="findModalText">

                Информация о месте пока не заполнена.

            </p>

        </div>

    </div>


    <!-- Контакты продавца -->

    <div
        id="contactModal"
        class="modal info-modal"
    >

        <div class="modal-content contact-modal-content">
            <p class="contact-modal-label">Телефон</p>

            <a id="sellerPhoneLink" class="seller-phone-link">
                Номер пока не указан
            </a>

            <div class="contact-socials" aria-label="Ссылки продавца">
                <a id="sellerTelegramLink" class="contact-icon contact-telegram" aria-label="Telegram">T</a>
                <a id="sellerInstagramLink" class="contact-icon contact-instagram" aria-label="Instagram">I</a>
                <a id="sellerViberLink" class="contact-icon contact-viber" aria-label="Viber">V</a>
            </div>

        </div>

    </div>


    <!-- Подключение JS -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js?v=20260625-5"></script>
    <script src="js/i18n.js?v=20260623-1"></script>
    <script src="js/core.js?v=20260624-1"></script>
    <script src="js/home.js?v=20260625-4"></script>
    <script src="js/seller-panel.js?v=20260625-2"></script>
    <script src="js/catalog.js?v=20260625-2"></script>
    <script src="js/app.js?v=20260625-4"></script>

</body>

</html>
